version: "3"

services:
  backend:
    image: frappe/erpnext:v13
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  configurator:
    image: frappe/erpnext:v13
    restart: "no"
    entrypoint: [bash, -c]
    command:
      - >
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net
    depends_on:
      db:
        condition: service_healthy

  create-site:
    image: frappe/erpnext:v13
    restart: "no"
    entrypoint: [bash, -c]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('db_host',''))"` ]]; do
          echo "Waiting for common_site_config.json...";
          sleep 3;
          if (( `date +%s`-start > 90 )); then echo "timeout"; exit 1; fi;
        done;
        echo "Config ready — creating site";
        bench new-site --mariadb-root-username=root --mariadb-root-password=admin --admin-password=admin --install-app erpnext --set-default abn.localhost;
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net
    depends_on:
      db:
        condition: service_healthy
      configurator:
        condition: service_completed_successfully

  frontend:
    image: frappe/erpnext:v13
    restart: unless-stopped
    command: [nginx-entrypoint.sh]
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: abn.localhost
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"
    networks:
      - abn_net
    depends_on:
      - backend
      - websocket

  websocket:
    image: frappe/erpnext:v13
    restart: unless-stopped
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net

  scheduler:
    image: frappe/erpnext:v13
    restart: unless-stopped
    command: [bench, schedule]
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net

  worker:
    image: frappe/erpnext:v13
    restart: unless-stopped
    command: [bench, worker, --queue, short,default,long]
    volumes:
      - ./sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - abn_net

  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - abn_net

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    networks:
      - abn_net

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data
    networks:
      - abn_net

volumes:
  db-data:
  redis-queue-data:
  logs:

networks:
  abn_net:
    driver: bridge
